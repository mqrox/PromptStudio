<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 1040" role="img" aria-labelledby="title desc">
  <title id="title">PromptStudioのPDCA</title>
  <desc id="desc">相談する、作る、試す、残す、直す、次の制作に使う、という改善サイクルを示す図。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { fill: #0f172a; font: 700 38px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .subtitle { fill: #475569; font: 500 20px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .card { fill: #ffffff; stroke: #dbe3ee; stroke-width: 2; }
      .step { fill: #0f172a; font: 700 27px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .body { fill: #475569; font: 500 22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .pillText { fill: #1e40af; font: 700 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .num { fill: #ffffff; font: 700 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .arrow { fill: none; stroke: #2563eb; stroke-width: 4; stroke-linecap: round; marker-end: url(#arrow); }
      .loop { fill: none; stroke: #94a3b8; stroke-width: 4; stroke-linecap: round; stroke-dasharray: 10 12; marker-end: url(#arrow); }
      .loopText { fill: #334155; font: 700 20px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="720" height="1040" rx="28"/>

  <text class="title" x="360" y="62" text-anchor="middle">使うほど良くなるPDCA</text>
  <text class="subtitle" x="360" y="100" text-anchor="middle">作るたびに記録が残り、次の制作に活きる</text>

  <path class="loop" d="M 118 855 C 52 802 52 222 118 168"/>
  <rect x="18" y="456" width="96" height="70" rx="18" fill="#e2e8f0" stroke="#cbd5e1"/>
  <text class="loopText" x="66" y="486" text-anchor="middle">改善が</text>
  <text class="loopText" x="66" y="512" text-anchor="middle">次へ</text>

  <g transform="translate(130 132)">
    <rect class="card" x="0" y="0" width="520" height="104" rx="18"/>
    <circle cx="50" cy="52" r="27" fill="#2563eb"/>
    <text class="num" x="50" y="60" text-anchor="middle">1</text>
    <rect x="398" y="24" width="84" height="32" rx="16" fill="#dbeafe"/>
    <text class="pillText" x="440" y="47" text-anchor="middle">PLAN</text>
    <text class="step" x="96" y="45">相談する</text>
    <text class="body" x="96" y="78">作りたいもの・案件の前提を入れる</text>
  </g>

  <path class="arrow" d="M 390 246 L 390 284"/>

  <g transform="translate(130 294)">
    <rect class="card" x="0" y="0" width="520" height="104" rx="18"/>
    <circle cx="50" cy="52" r="27" fill="#2563eb"/>
    <text class="num" x="50" y="60" text-anchor="middle">2</text>
    <rect x="398" y="24" width="84" height="32" rx="16" fill="#dbeafe"/>
    <text class="pillText" x="440" y="47" text-anchor="middle">PLAN</text>
    <text class="step" x="96" y="45">作る</text>
    <text class="body" x="96" y="78">プロンプトと生成設定を作る</text>
  </g>

  <path class="arrow" d="M 390 408 L 390 446"/>

  <g transform="translate(130 456)">
    <rect class="card" x="0" y="0" width="520" height="104" rx="18"/>
    <circle cx="50" cy="52" r="27" fill="#0f766e"/>
    <text class="num" x="50" y="60" text-anchor="middle">3</text>
    <rect x="412" y="24" width="70" height="32" rx="16" fill="#ccfbf1"/>
    <text class="pillText" x="447" y="47" text-anchor="middle" fill="#0f766e">DO</text>
    <text class="step" x="96" y="45">試す</text>
    <text class="body" x="96" y="78">生成AIで画像・動画・案を出す</text>
  </g>

  <path class="arrow" d="M 390 570 L 390 608"/>

  <g transform="translate(130 618)">
    <rect class="card" x="0" y="0" width="520" height="104" rx="18"/>
    <circle cx="50" cy="52" r="27" fill="#c2410c"/>
    <text class="num" x="50" y="60" text-anchor="middle">4</text>
    <rect x="386" y="24" width="96" height="32" rx="16" fill="#ffedd5"/>
    <text class="pillText" x="434" y="47" text-anchor="middle" fill="#c2410c">CHECK</text>
    <text class="step" x="96" y="45">残す</text>
    <text class="body" x="96" y="78">結果・失敗理由・レビューを保存</text>
  </g>

  <path class="arrow" d="M 390 732 L 390 770"/>

  <g transform="translate(130 780)">
    <rect class="card" x="0" y="0" width="520" height="104" rx="18"/>
    <circle cx="50" cy="52" r="27" fill="#7c3aed"/>
    <text class="num" x="50" y="60" text-anchor="middle">5</text>
    <rect x="404" y="24" width="78" height="32" rx="16" fill="#ede9fe"/>
    <text class="pillText" x="443" y="47" text-anchor="middle" fill="#6d28d9">ACT</text>
    <text class="step" x="96" y="45">直す</text>
    <text class="body" x="96" y="78">共通スキルを改善する</text>
  </g>

  <path class="arrow" d="M 390 894 L 390 932"/>

  <g transform="translate(130 942)">
    <rect class="card" x="0" y="0" width="520" height="78" rx="18" fill="#eff6ff" stroke="#bfdbfe" stroke-width="2"/>
    <circle cx="50" cy="39" r="24" fill="#2563eb"/>
    <text class="num" x="50" y="47" text-anchor="middle">6</text>
    <text class="step" x="96" y="34">次の制作で使う</text>
    <text class="body" x="96" y="64">前より迷わず、良い前提で始められる</text>
  </g>
</svg>
